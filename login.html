<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Abivian</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:#060606;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased;
}

canvas#particles{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

.login-wrap{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:2rem;
  max-width:420px;
  width:100%;
  animation:fadeUp .9s cubic-bezier(.23,1,.32,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

.logo-wrap{
  margin-bottom:2.5rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .1s both;
}
.logo-wrap img{
  height:52px;
  width:auto;
  filter:brightness(0) invert(1);
  opacity:.92;
}

.tagline{
  font-size:10px;
  font-weight:500;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,.28);
  margin-bottom:2rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .2s both;
}

.headline{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2.6rem,7vw,3.8rem);
  font-weight:400;
  line-height:1.08;
  letter-spacing:-.02em;
  color:#fff;
  margin-bottom:3rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .32s both;
}
.headline .accent{
  font-style:italic;
  color:rgba(255,255,255,.55);
}

.divider{
  width:32px;
  height:1px;
  background:rgba(255,255,255,.1);
  margin:0 auto 2.5rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .42s both;
}

.btn-signin{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.6rem;
  background:#fff;
  color:#1a1a1a;
  text-decoration:none;
  font-family:'Inter',sans-serif;
  font-size:.875rem;
  font-weight:500;
  letter-spacing:.01em;
  padding:.85rem 2.25rem;
  border-radius:4px;
  border:none;
  cursor:pointer;
  width:100%;
  max-width:280px;
  transition:background .2s, transform .15s;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .52s both;
}
.btn-signin:hover{
  background:#f0f0f0;
  transform:translateY(-1px);
}
.btn-signin:active{transform:translateY(0)}

.btn-signin svg{
  width:18px;
  height:18px;
  flex-shrink:0;
}

.access-note{
  margin-top:1.75rem;
  font-size:.7rem;
  color:rgba(255,255,255,.2);
  letter-spacing:.04em;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .62s both;
}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:.35rem;
  margin-top:2.5rem;
  font-size:.75rem;
  color:rgba(255,255,255,.22);
  text-decoration:none;
  letter-spacing:.03em;
  transition:color .2s;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .7s both;
}
.back-link:hover{color:rgba(255,255,255,.55)}
.back-link::before{content:'←';font-size:.8rem}

.error-msg{
  background:rgba(220,53,69,.12);
  border:1px solid rgba(220,53,69,.25);
  color:#ff8a8a;
  font-size:.78rem;
  padding:.65rem 1rem;
  border-radius:4px;
  margin-bottom:1.5rem;
  width:100%;
  max-width:280px;
  animation:fadeUp .5s ease both;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="login-wrap">

  <div class="logo-wrap">
    <img src="logo.png" alt="Abivian" onerror="this.style.display='none';document.querySelector('.logo-text').style.display='block'">
    <div class="logo-text" style="display:none;font-family:'Inter',sans-serif;font-size:1.25rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#fff;opacity:.9">ABIVIAN</div>
  </div>

  <p class="tagline">Deterministic AI for Compliance</p>

  <h1 class="headline">
    Compliance,<br>
    <span class="accent">Resolved.</span>
  </h1>

  <div class="divider"></div>

  <div id="error-container"></div>

  <a href="/.netlify/functions/auth-login" class="btn-signin">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <p class="access-note">Access restricted to authorised users</p>

  <a href="/" class="back-link">Back to abivian.com</a>

</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

let W, H, nodes = [];
const COUNT = 72;
const MAX_DIST = 140;
const GREEN = '122,158,122';

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function Node(){
  this.x = Math.random() * W;
  this.y = Math.random() * H;
  this.vx = (Math.random() - .5) * .28;
  this.vy = (Math.random() - .5) * .28;
  this.r = Math.random() * 1.5 + .6;
  this.opacity = Math.random() * .4 + .15;
}

function init(){
  resize();
  nodes = Array.from({length: COUNT}, () => new Node());
}

function tick(){
  ctx.clearRect(0, 0, W, H);

  nodes.forEach(n => {
    n.x += n.vx;
    n.y += n.vy;
    if(n.x < 0 || n.x > W) n.vx *= -1;
    if(n.y < 0 || n.y > H) n.vy *= -1;
  });

  for(let i = 0; i < nodes.length; i++){
    for(let j = i + 1; j < nodes.length; j++){
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < MAX_DIST){
        const alpha = (1 - d / MAX_DIST) * .18;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(${GREEN},${alpha})`;
        ctx.lineWidth = .6;
        ctx.stroke();
      }
    }
  }

  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${GREEN},${n.opacity})`;
    ctx.fill();
  });

  requestAnimationFrame(tick);
}

window.addEventListener('resize', () => { resize(); });
init();
tick();

// Handle error params
const params = new URLSearchParams(window.location.search);
const errorCode = params.get('error');
if(errorCode){
  const messages = {
    auth_failed:  'Authentication failed. Please try again.',
    login_failed: 'Could not initiate login. Please try again.',
    missing_code: 'Login was incomplete. Please try again.',
    unauthorized: 'Access denied. Your account is not authorised to use this platform.'
  };
  const msg = messages[errorCode] || 'An error occurred. Please try again.';
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = msg;
  document.getElementById('error-container').appendChild(el);
}
</script>
</body>
</html>
