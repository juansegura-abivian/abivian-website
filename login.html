<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Abivian</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:#060606;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased;
}

/* ── Radar background ─────────────────────────────── */
#radar-bg{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:0;
  pointer-events:none;
  opacity:.55;
}
#radar-wrap{
  position:relative;
  width:min(100vw,100vh);
  height:min(100vw,100vh);
}
#radar-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
.radar-node{
  position:absolute;
  z-index:2;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:none;
  transition:opacity .3s;
}
.radar-node-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(122,158,122,.3);
  margin:0 auto 3px;
  transition:all .4s;
}
.radar-node-name{
  font-size:.6rem;font-weight:500;
  color:rgba(255,255,255,.25);
  white-space:nowrap;transition:all .4s;
  letter-spacing:.01em;
}
.radar-node-area{
  font-size:.5rem;font-weight:300;
  color:rgba(255,255,255,.12);
  white-space:nowrap;transition:all .4s;
}
.radar-node.lit .radar-node-dot{
  background:rgba(122,158,122,.9);
  box-shadow:0 0 8px rgba(122,158,122,.6),0 0 16px rgba(122,158,122,.3);
}
.radar-node.lit .radar-node-name{color:rgba(255,255,255,.75)}
.radar-node.lit .radar-node-area{color:rgba(122,158,122,.6)}

/* ── Login card ───────────────────────────────────── */
.login-wrap{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:2.5rem 2rem;
  max-width:400px;
  width:100%;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.logo-wrap{
  margin-bottom:2rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .1s both;
}
.logo-wrap img{
  height:48px;width:auto;
  filter:brightness(0) invert(1);
  opacity:.9;
}
.logo-text{
  font-size:1.1rem;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.88);
}

.tagline{
  font-size:9px;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
  margin-bottom:1.75rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .2s both;
}

.headline{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2.4rem,6vw,3.4rem);
  font-weight:400;line-height:1.08;
  letter-spacing:-.02em;
  color:#fff;
  margin-bottom:2.5rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .32s both;
}
.headline em{
  font-style:italic;
  color:rgba(255,255,255,.45);
}

.divider{
  width:28px;height:1px;
  background:rgba(255,255,255,.1);
  margin:0 auto 2.25rem;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .4s both;
}

#error-container{ width:100%;max-width:272px; }
.error-msg{
  background:rgba(220,53,69,.1);
  border:1px solid rgba(220,53,69,.22);
  color:#ff8a8a;font-size:.75rem;
  padding:.6rem .9rem;border-radius:4px;
  margin-bottom:1.25rem;
  animation:fadeUp .4s ease both;
}

.btn-signin{
  display:inline-flex;align-items:center;
  justify-content:center;gap:.55rem;
  background:#fff;color:#1a1a1a;
  text-decoration:none;
  font-family:'Inter',sans-serif;
  font-size:.85rem;font-weight:500;
  letter-spacing:.01em;
  padding:.85rem 2rem;border-radius:4px;
  width:100%;max-width:272px;
  transition:background .2s,transform .15s;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .5s both;
}
.btn-signin:hover{background:#efefef;transform:translateY(-1px)}
.btn-signin:active{transform:translateY(0)}
.btn-signin svg{width:17px;height:17px;flex-shrink:0}

.access-note{
  margin-top:1.5rem;
  font-size:.68rem;
  color:rgba(255,255,255,.18);
  letter-spacing:.04em;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .6s both;
}

.back-link{
  display:inline-flex;align-items:center;gap:.3rem;
  margin-top:2rem;
  font-size:.72rem;
  color:rgba(255,255,255,.2);
  text-decoration:none;letter-spacing:.03em;
  transition:color .2s;
  animation:fadeUp .7s cubic-bezier(.23,1,.32,1) .68s both;
}
.back-link:hover{color:rgba(255,255,255,.5)}
.back-link::before{content:'←';font-size:.78rem}
</style>
</head>
<body>

<!-- Radar background -->
<div id="radar-bg">
  <div id="radar-wrap">
    <canvas id="radar-canvas"></canvas>
  </div>
</div>

<!-- Login UI -->
<div class="login-wrap">

  <div class="logo-wrap">
    <img src="logo.png" alt="Abivian"
      onerror="this.style.display='none';document.querySelector('.logo-text').style.display='block'">
    <div class="logo-text" style="display:none">ABIVIAN</div>
  </div>

  <p class="tagline">Deterministic AI for Compliance</p>

  <h1 class="headline">Compliance,<br><em>Resolved.</em></h1>

  <div class="divider"></div>

  <div id="error-container"></div>

  <a href="/.netlify/functions/auth-login" class="btn-signin">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <p class="access-note">Access restricted to authorised users</p>
  <a href="/" class="back-link">Back to abivian.com</a>

</div>

<script>
(function(){
  const wrap = document.getElementById('radar-wrap');
  const canvas = document.getElementById('radar-canvas');
  const ctx = canvas.getContext('2d');

  const frameworks = [
    {name:'EU AI Act',area:'AI & Data',ring:0},
    {name:'EU GDPR',area:'Data Privacy',ring:0},
    {name:'DORA',area:'Cyber & Resilience',ring:0},
    {name:'CSRD',area:'ESG & Sustainability',ring:0},
    {name:'MiFID II',area:'Financial',ring:0},
    {name:'U.S. Sanctions (OFAC)',area:'Financial Crime',ring:0},
    {name:'SOX',area:'Accounting & Governance',ring:0},
    {name:'NIS2',area:'Cyber & Resilience',ring:1},
    {name:'EU Cyber Resilience Act',area:'Cyber & Resilience',ring:1},
    {name:'CCPA / CPRA',area:'Data Privacy',ring:1},
    {name:'EU Data Act',area:'AI & Data',ring:1},
    {name:'AMLD6',area:'Financial Crime',ring:1},
    {name:'Dodd-Frank',area:'Financial',ring:1},
    {name:'SFDR',area:'ESG & Sustainability',ring:1},
    {name:'REACH',area:'Chemicals & Materials',ring:1},
    {name:'FCPA',area:'Financial Crime',ring:1},
    {name:'CRR3 / CRD6',area:'Financial',ring:2},
    {name:'MiCA',area:'Financial',ring:2},
    {name:'Solvency II',area:'Financial',ring:2},
    {name:'U.S. GAAP',area:'Accounting & Governance',ring:2},
    {name:'Bank Secrecy Act',area:'Financial Crime',ring:2},
    {name:'TSCA',area:'Chemicals & Materials',ring:2},
    {name:'GPSR',area:'Product & Consumer Safety',ring:2},
    {name:'EAR',area:'Trade & Export Controls',ring:2},
    {name:'CBAM',area:'Trade & Sustainability',ring:2}
  ];

  const ringRadii = [0.22, 0.37, 0.48];
  let nodes = [], sweepAngle = 0, animId = null;

  function layout(){
    const w = wrap.offsetWidth;
    const h = wrap.offsetHeight;
    canvas.width = w * devicePixelRatio;
    canvas.height = h * devicePixelRatio;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    const cx = w / 2, cy = h / 2;
    wrap.querySelectorAll('.radar-node').forEach(el => el.remove());
    nodes = [];
    const rings = [[], [], []];
    frameworks.forEach(f => rings[f.ring].push(f));
    rings.forEach((ring, ri) => {
      const r = ringRadii[ri] * Math.min(w, h);
      ring.forEach((f, i) => {
        const angle = (Math.PI * 2 * i / ring.length) - Math.PI / 2;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        const el = document.createElement('div');
        el.className = 'radar-node';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.innerHTML =
          '<div class="radar-node-dot"></div>' +
          '<div class="radar-node-name">' + f.name + '</div>' +
          '<div class="radar-node-area">' + f.area + '</div>';
        wrap.appendChild(el);
        nodes.push({ x, y, angle, el, ring: ri });
      });
    });
  }

  function draw(){
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const cx = w / 2, cy = h / 2;
    ctx.clearRect(0, 0, w, h);
    ringRadii.forEach((rr, i) => {
      const r = rr * Math.min(w, h);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(122,158,122,' + (0.15 - i * 0.03) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(n.x, n.y);
      ctx.strokeStyle = 'rgba(122,158,122,0.05)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(122,158,122,.8)';
    ctx.fill();
    const sweepLen = 0.7;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(sweepAngle);
    const maxR = ringRadii[2] * Math.min(w, h) + 40;
    const grad = ctx.createLinearGradient(0, 0, maxR, 0);
    grad.addColorStop(0, 'rgba(122,158,122,0.28)');
    grad.addColorStop(0.5, 'rgba(122,158,122,0.07)');
    grad.addColorStop(1, 'rgba(122,158,122,0)');
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, maxR, -sweepLen * 0.15, sweepLen * 0.15);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(maxR, 0);
    ctx.strokeStyle = 'rgba(122,158,122,0.22)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    nodes.forEach(n => {
      let nodeAngle = Math.atan2(n.y - cy, n.x - cx);
      let diff = sweepAngle - nodeAngle;
      while(diff > Math.PI) diff -= Math.PI * 2;
      while(diff < -Math.PI) diff += Math.PI * 2;
      n.el.classList.toggle('lit', Math.abs(diff) < 0.3);
    });
  }

  function animate(){
    sweepAngle += 0.008;
    if(sweepAngle > Math.PI * 2) sweepAngle -= Math.PI * 2;
    draw();
    animId = requestAnimationFrame(animate);
  }

  function init(){
    layout();
    if(animId) cancelAnimationFrame(animId);
    animate();
  }

  window.addEventListener('resize', init);
  init();
})();

// Error handling
const params = new URLSearchParams(window.location.search);
const errorCode = params.get('error');
if(errorCode){
  const messages = {
    auth_failed:  'Authentication failed. Please try again.',
    login_failed: 'Could not initiate login. Please try again.',
    missing_code: 'Login was incomplete. Please try again.',
    unauthorized: 'Access denied. Your account is not authorised to use this platform.'
  };
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = messages[errorCode] || 'An error occurred. Please try again.';
  document.getElementById('error-container').appendChild(el);
}
</script>
</body>
</html>
